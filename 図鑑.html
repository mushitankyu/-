<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ムシキャッチ図鑑 Pro (iNaturalist版)</title>
    <style>
        :root { --pokedex-red: #cc0000; --screen-blue: #a8dadc; }
        body { font-family: 'Helvetica', 'Arial', sans-serif; background: #333; color: white; text-align: center; margin: 0; padding-bottom: 50px; }
        #camera-panel { background: var(--pokedex-red); padding: 20px; border-bottom: 10px solid #8b0000; }
        
        /* プレビューエリア */
        #preview-container { position: relative; width: 320px; height: 320px; margin: 10px auto; background: black; overflow: hidden; border: 8px solid #ddd; border-radius: 10px; }
        video, #preview-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        
        /* 検索枠（クロップ枠） */
        #crop-box {
            position: absolute; border: 3px solid #00ff00; box-shadow: 0 0 0 4000px rgba(0,0,0,0.6);
            cursor: move; touch-action: none; top: 60px; left: 60px; width: 200px; height: 200px; z-index: 10;
        }
        #resize-handle { position: absolute; bottom: 0; right: 0; width: 30px; height: 30px; background: #00ff00; cursor: nwse-resize; }

        .btn-group { margin: 15px; }
        button, .file-label { padding: 12px 20px; margin: 5px; font-weight: bold; cursor: pointer; border: none; border-radius: 25px; display: inline-block; }
        .capture-btn { background: #ffcc00; color: #333; font-size: 1.2em; box-shadow: 0 4px #b89400; }
        .capture-btn:active { transform: translateY(2px); box-shadow: none; }
        .file-label { background: #eee; color: #333; font-size: 0.9em; }
        
        /* 図鑑UI */
        .zukan-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .bug-card { background: var(--screen-blue); color: #333; width: 300px; border-radius: 15px; overflow: hidden; border: 4px solid #fff; animation: popIn 0.3s ease-out; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .bug-card img { width: 100%; height: 180px; object-fit: cover; background: #fff; }
        .bug-info { padding: 15px; text-align: left; }
        .bug-name { font-size: 1.3em; font-weight: bold; color: #cc0000; margin-bottom: 8px; border-bottom: 2px solid #555; }
        .bug-desc { font-size: 0.9em; line-height: 1.4; height: 4.2em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
    </style>
</head>
<body>

<div id="camera-panel">
    <h1>MUSI-DEX SCANNER</h1>
    
    <div id="preview-container">
        <video id="video" autoplay playsinline></video>
        <img id="preview-img" style="display:none;">
        <div id="crop-box"><div id="resize-handle"></div></div>
    </div>

    <div class="btn-group">
        <label class="file-label">
            画像を選択 <input type="file" id="file-input" accept="image/*" style="display:none;">
        </label>
        <button class="capture-btn" id="snap">枠内をスキャン！</button>
    </div>
    <p id="status">枠内に虫を捉えてください</p>
</div>

<canvas id="crop-canvas" style="display:none;"></canvas>

<h2>登録済み虫図鑑</h2>
<div id="zukan" class="zukan-container"></div>

<script>
const video = document.getElementById('video');
const previewImg = document.getElementById('preview-img');
const fileInput = document.getElementById('file-input');
const cropBox = document.getElementById('crop-box');
const container = document.getElementById('preview-container');
const status = document.getElementById('status');

// 1. カメラ起動
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => { video.srcObject = stream; })
    .catch(err => { status.innerText = "カメラを起動できません"; });

// 2. ファイル読み込み（デバイス内の画像）
fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (f) => {
            previewImg.src = f.target.result;
            previewImg.style.display = 'block';
            video.style.display = 'none';
            status.innerText = "画像を取り込みました";
        };
        reader.readAsDataURL(file);
    }
});

// 3. 枠の移動・リサイズ（ドラッグ＆ドロップ）
let isDragging = false, isResizing = false;
let startX, startY, startW, startH, startTop, startLeft;

cropBox.addEventListener('mousedown', startAction);
cropBox.addEventListener('touchstart', startAction, {passive: false});

function startAction(e) {
    const touch = e.touches ? e.touches[0] : e;
    if (e.target.id === 'resize-handle') isResizing = true;
    else isDragging = true;
    startX = touch.clientX; startY = touch.clientY;
    startW = cropBox.offsetWidth; startH = cropBox.offsetHeight;
    startTop = cropBox.offsetTop; startLeft = cropBox.offsetLeft;
    if(e.cancelable) e.preventDefault();
}

window.addEventListener('mousemove', doAction);
window.addEventListener('touchmove', doAction, {passive: false});

function doAction(e) {
    if (!isDragging && !isResizing) return;
    const touch = e.touches ? e.touches[0] : e;
    const dx = touch.clientX - startX;
    const dy = touch.clientY - startY;

    if (isResizing) {
        cropBox.style.width = Math.max(50, startW + dx) + 'px';
        cropBox.style.height = Math.max(50, startH + dy) + 'px';
    } else if (isDragging) {
        cropBox.style.left = Math.min(Math.max(0, startLeft + dx), container.offsetWidth - cropBox.offsetWidth) + 'px';
        cropBox.style.top = Math.min(Math.max(0, startTop + dy), container.offsetHeight - cropBox.offsetHeight) + 'px';
    }
}

window.addEventListener('mouseup', () => isDragging = isResizing = false);
window.addEventListener('touchend', () => isDragging = isResizing = false);

// 4. iNaturalist API 連携スキャン
document.getElementById('snap').addEventListener('click', async () => {
    status.innerText = "世界中のデータから検索中...";
    const canvas = document.getElementById('crop-canvas');
    const ctx = canvas.getContext('2d');
    
    const source = video.style.display === 'none' ? previewImg : video;
    const sWidth = source.videoWidth || source.naturalWidth;
    const sHeight = source.videoHeight || source.naturalHeight;
    const scaleX = sWidth / container.offsetWidth;
    const scaleY = sHeight / container.offsetHeight;
    
    canvas.width = cropBox.offsetWidth * scaleX;
    canvas.height = cropBox.offsetHeight * scaleY;
    
    ctx.drawImage(source, 
        cropBox.offsetLeft * scaleX, cropBox.offsetTop * scaleY, canvas.width, canvas.height,
        0, 0, canvas.width, canvas.height);

    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));
    const formData = new FormData();
    formData.append('image', blob);

    try {
        // iNaturalist Computer Vision API
        const response = await fetch('https://api.inaturalist.org/v1/computervision/score', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        
        if (data.results && data.results.length > 0) {
            const topResult = data.results[0].taxon;
            const japaneseName = topResult.preferred_common_name || topResult.name;
            fetchWikipediaInfo(japaneseName, canvas.toDataURL());
        } else {
            status.innerText = "虫が見つかりませんでした";
        }
    } catch (err) {
        status.innerText = "検索エラーが発生しました";
        console.error(err);
    }
});

// 5. Wikipediaから簡潔な説明を取得
async function fetchWikipediaInfo(name, imageData) {
    const wikiUrl = `https://ja.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`;
    try {
        const response = await fetch(wikiUrl);
        const data = await response.json();
        const desc = data.extract || "詳しい説明が見つかりませんでした。";
        addToZukan(name, desc, imageData);
        status.innerText = `${name} を図鑑に記録しました！`;
    } catch (e) {
        addToZukan(name, "Wikipediaに情報がありませんでした。", imageData);
    }
}

// 6. 図鑑表示
function addToZukan(name, desc, image) {
    const zukan = document.getElementById('zukan');
    const card = document.createElement('div');
    card.className = 'bug-card';
    card.innerHTML = `
        <img src="${image}">
        <div class="bug-info">
            <div class="bug-name">${name}</div>
            <div class="bug-desc">${desc}</div>
        </div>
    `;
    zukan.prepend(card);
}
</script>
</body>
</html>
